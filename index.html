<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>りんご なんこ？</title>
<style>
  :root {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --shadow: 0 8px 20px rgba(0,0,0,.10);
    --radius: 16px;
    --card-w: min(92vw, 360px);
    --dark: #111;
    --success: #0f8a2b;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--dark);
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 12px;
  }

  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 12px 16px;
    position: relative;
  }

  .titleRow {
    position: relative;
    min-height: 44px;
    margin-bottom: 8px;
  }

  .title {
    font-weight: 950;
    font-size: 22px;
    margin: 0;
    text-align: center;
    line-height: 44px;
  }

  .soundBtn {
    position: absolute;
    right: 0;
    top: 0;
    border: 0;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    font-size: 15px;
    font-weight: 950;
    cursor: pointer;
    background: #f1f1f1;
    color: var(--dark);
    line-height: 1;
  }

  .soundBtn.off {
    background: #e9e9e9;
    color: #666;
  }

  .soundIcon {
    font-size: 18px;
    line-height: 1;
  }

  .topModes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 4px 0 14px;
  }

  .modeBtn {
    border: 0;
    border-radius: 12px;
    padding: 12px 18px;
    min-width: 120px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    background: #ececec;
    color: var(--dark);
    transition: transform .12s ease, background .12s ease, color .12s ease;
  }

  .modeBtn.active {
    background: var(--dark);
    color: #fff;
  }

  .modeBtn:disabled,
  .soundBtn:disabled {
    opacity: .55;
    cursor: not-allowed;
  }

  .stage {
    display: flex;
    justify-content: center;
  }

  .card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 6px 14px rgba(0,0,0,.08);
    padding: 12px;
    position: relative;
    aspect-ratio: 3 / 4;
    width: var(--card-w);
    overflow: hidden;
    margin: 0 auto;
  }

  .card::after {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 12px;
    border: 3px solid rgba(0,0,0,.06);
    pointer-events: none;
    z-index: 5;
  }

  .cardInner {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .cardDisplay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
  }

  .cardDisplay.show {
    display: flex;
  }

  .shakeTarget {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .appleCardsRow {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
    padding: 0 6px;
  }

  .appleCardSlot {
    flex: 1 1 0;
    max-width: 46%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .appleCardImg {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    user-select: none;
    pointer-events: none;
    display: block;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.08));
  }

  .answerBadge {
    position: absolute;
    left: 50%;
    bottom: 14px;
    transform: translateX(-50%) translateY(8px) scale(.96);
    min-width: 74px;
    height: 74px;
    padding: 0 16px;
    border-radius: 999px;
    background: rgba(255,255,255,.95);
    border: 3px solid rgba(15,138,43,.18);
    color: var(--success);
    box-shadow: 0 8px 18px rgba(0,0,0,.10);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    font-weight: 950;
    opacity: 0;
    transition: opacity .14s ease, transform .14s ease;
    pointer-events: none;
  }

  .answerBadge.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
  }

  .messageArea {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }

  .messageArea.show {
    display: flex;
  }

  .messageInner {
    background: rgba(255,255,255,.9);
    border-radius: 20px;
    padding: 20px 22px;
    box-shadow: 0 10px 24px rgba(0,0,0,.12);
    min-width: min(280px, 82%);
  }

  .messageTitle {
    font-size: clamp(28px, 7vw, 40px);
    font-weight: 950;
    line-height: 1.25;
    margin: 0;
    white-space: pre-line;
  }

  .messageSub {
    margin: 10px 0 0;
    font-size: 16px;
    font-weight: 800;
    color: #555;
    line-height: 1.6;
    white-space: pre-line;
  }

  .resultResetBtn {
    margin-top: 14px;
    border: 0;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    background: #efefef;
    color: var(--dark);
  }

  .resultResetBtn.hidden {
    display: none;
  }

  .controls {
    display: flex;
    justify-content: center;
    margin-top: 16px;
  }

  .controls.hidden {
    display: none;
  }

  .mainBtn {
    border: 0;
    border-radius: 14px;
    font-weight: 950;
    cursor: pointer;
    padding: 14px 18px;
    font-size: 18px;
    background: var(--dark);
    color: #fff;
    min-width: 170px;
  }

  .mainBtn:disabled {
    opacity: .55;
    cursor: not-allowed;
  }

  .pad {
    max-width: 430px;
    margin: 16px auto 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .digitBtn {
    border: 0;
    border-radius: 16px;
    background: #fff;
    color: var(--dark);
    box-shadow: 0 6px 14px rgba(0,0,0,.08);
    min-height: 74px;
    font-size: 30px;
    font-weight: 950;
    cursor: pointer;
    transition: transform .08s ease, opacity .08s ease;
  }

  .digitBtn:active {
    transform: translateY(1px) scale(.99);
  }

  .digitBtn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  @keyframes shake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-10px); }
    40%  { transform: translateX(10px); }
    60%  { transform: translateX(-8px); }
    80%  { transform: translateX(8px); }
    100% { transform: translateX(0); }
  }

  .shakeTarget.shake {
    animation: shake .22s ease;
  }

  @keyframes flashCorrect {
    0%   { filter: brightness(1); }
    50%  { filter: brightness(1.12); }
    100% { filter: brightness(1); }
  }

  .cardInner.flashCorrect {
    animation: flashCorrect .18s ease;
  }

  @media (max-width: 560px) {
    :root {
      --card-w: min(96vw, 390px);
    }

    .wrap {
      padding: 6px;
    }

    .panel {
      padding: 10px 8px 12px;
    }

    .titleRow {
      min-height: 92px;
      margin-bottom: 2px;
    }

    .title {
      line-height: 1.35;
      padding-top: 6px;
      font-size: 20px;
    }

    .soundBtn {
      top: 46px;
      right: 0;
      font-size: 13px;
      padding: 8px 10px;
    }

    .topModes {
      margin: 0 0 8px;
      gap: 8px;
    }

    .modeBtn {
      min-width: 104px;
      font-size: 14px;
      padding: 10px 12px;
    }

    .card {
      aspect-ratio: auto;
      height: 245px;
    }

    .cardDisplay {
      padding: 14px;
    }

    .appleCardsRow {
      gap: 8px;
      padding: 0;
    }

    .appleCardSlot {
      max-width: 47%;
    }

    .answerBadge {
      bottom: 10px;
      min-width: 64px;
      height: 64px;
      font-size: 36px;
    }

    .pad {
      margin: 2px auto 0;
      gap: 8px;
    }

    .digitBtn {
      min-height: 62px;
      font-size: 26px;
    }

    .controls {
      margin-top: 10px;
    }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="titleRow">
        <p class="title">りんご なんこ？</p>
        <button id="soundBtn" class="soundBtn" type="button" aria-pressed="true" title="おとの オンオフ">
          <span id="soundIcon" class="soundIcon">🔊</span>
          <span id="soundLabel">おと ON</span>
        </button>
      </div>

      <div class="topModes" aria-label="モードせんたく">
        <button id="practiceModeBtn" class="modeBtn active" type="button">れんしゅう</button>
        <button id="challengeModeBtn" class="modeBtn" type="button">30びょう</button>
      </div>

      <div class="stage">
        <div class="card">
          <div id="cardInner" class="cardInner">
            <div id="cardDisplay" class="cardDisplay">
              <div id="shakeTarget" class="shakeTarget">
                <div class="appleCardsRow">
                  <div class="appleCardSlot">
                    <img id="appleCardImgLeft" class="appleCardImg" src="" alt="ひだりの りんごカード" />
                  </div>
                  <div class="appleCardSlot">
                    <img id="appleCardImgRight" class="appleCardImg" src="" alt="みぎの りんごカード" />
                  </div>
                  <div id="answerBadge" class="answerBadge"></div>
                </div>
              </div>
            </div>

            <div id="messageArea" class="messageArea">
              <div class="messageInner">
                <p id="messageTitle" class="messageTitle">30びょう</p>
                <p id="messageSub" class="messageSub">スタートで はじめるよ</p>
                <button id="resultResetBtn" class="resultResetBtn hidden" type="button">ベストきろくを リセット</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="controls" class="controls hidden">
        <button id="mainBtn" class="mainBtn" type="button">スタート</button>
      </div>

      <div class="pad" id="pad">
        <button class="digitBtn" type="button" data-digit="1">1</button>
        <button class="digitBtn" type="button" data-digit="2">2</button>
        <button class="digitBtn" type="button" data-digit="3">3</button>
        <button class="digitBtn" type="button" data-digit="4">4</button>
        <button class="digitBtn" type="button" data-digit="5">5</button>
        <button class="digitBtn" type="button" data-digit="6">6</button>
        <button class="digitBtn" type="button" data-digit="7">7</button>
        <button class="digitBtn" type="button" data-digit="8">8</button>
        <button class="digitBtn" type="button" data-digit="9">9</button>
      </div>
    </div>
  </div>

<script>
  const STORAGE_SOUND_KEY = "appleCountSoundOn";
  const STORAGE_BEST_KEY = "appleCountBest30";

  const CARD_IMAGES = [
    null,
    "01.png",
    "02.png",
    "03.png",
    "04.png",
    "05.png",
    "06.png",
    "07.png",
    "08.png",
    "09.png"
  ];

  const state = {
    mode: "practice",
    current: null,
    practiceLocked: false,
    challengeRunning: false,
    challengeBusy: false,
    score: 0,
    misses: 0,
    best: Number(localStorage.getItem(STORAGE_BEST_KEY) || 0),
    soundOn: localStorage.getItem(STORAGE_SOUND_KEY) !== "off",
    timerId: null,
    nextId: null,
    endAt: 0,
    showResetButton: false
  };

  const soundBtn = document.getElementById("soundBtn");
  const soundIcon = document.getElementById("soundIcon");
  const soundLabel = document.getElementById("soundLabel");

  const practiceModeBtn = document.getElementById("practiceModeBtn");
  const challengeModeBtn = document.getElementById("challengeModeBtn");

  const controls = document.getElementById("controls");
  const mainBtn = document.getElementById("mainBtn");
  const resultResetBtn = document.getElementById("resultResetBtn");

  const cardInner = document.getElementById("cardInner");
  const cardDisplay = document.getElementById("cardDisplay");
  const messageArea = document.getElementById("messageArea");
  const shakeTarget = document.getElementById("shakeTarget");
  const messageTitle = document.getElementById("messageTitle");
  const messageSub = document.getElementById("messageSub");

  const appleCardImgLeft = document.getElementById("appleCardImgLeft");
  const appleCardImgRight = document.getElementById("appleCardImgRight");
  const answerBadge = document.getElementById("answerBadge");

  const digitButtons = Array.from(document.querySelectorAll(".digitBtn"));

  let audioCtx = null;

  function preloadImages() {
    for (let i = 1; i <= 9; i++) {
      const img = new Image();
      img.src = CARD_IMAGES[i];
    }
  }

  function getAudioCtx() {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return null;
    if (!audioCtx) audioCtx = new AudioContextClass();
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    return audioCtx;
  }

  function beep({ freq = 880, duration = 0.08, type = "sine", gain = 0.03, when = 0 }) {
    if (!state.soundOn) return;
    const ctx = getAudioCtx();
    if (!ctx) return;

    const now = ctx.currentTime + when;
    const osc = ctx.createOscillator();
    const amp = ctx.createGain();

    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);

    amp.gain.setValueAtTime(0.0001, now);
    amp.gain.exponentialRampToValueAtTime(gain, now + 0.01);
    amp.gain.exponentialRampToValueAtTime(0.0001, now + duration);

    osc.connect(amp);
    amp.connect(ctx.destination);

    osc.start(now);
    osc.stop(now + duration + 0.02);
  }

  function playCorrectSound() {
    beep({ freq: 880, duration: 0.08, type: "sine", gain: 0.035, when: 0 });
    beep({ freq: 1320, duration: 0.1, type: "sine", gain: 0.03, when: 0.08 });
  }

  function playWrongSound() {
    beep({ freq: 180, duration: 0.12, type: "triangle", gain: 0.03, when: 0 });
  }

  function clearTimers() {
    if (state.timerId) {
      clearInterval(state.timerId);
      state.timerId = null;
    }
    if (state.nextId) {
      clearTimeout(state.nextId);
      state.nextId = null;
    }
  }

  function setPadDisabled(disabled) {
    digitButtons.forEach(btn => {
      btn.disabled = disabled;
    });
  }

  function setModeButtons() {
    practiceModeBtn.classList.toggle("active", state.mode === "practice");
    challengeModeBtn.classList.toggle("active", state.mode === "challenge");
  }

  function updateSoundButton() {
    soundBtn.classList.toggle("off", !state.soundOn);
    soundBtn.setAttribute("aria-pressed", state.soundOn ? "true" : "false");
    soundIcon.textContent = state.soundOn ? "🔊" : "🔇";
    soundLabel.textContent = state.soundOn ? "おと ON" : "おと OFF";
  }

  function updateResultResetButton() {
    resultResetBtn.classList.toggle("hidden", !state.showResetButton);
  }

  function showCard() {
    cardDisplay.classList.add("show");
    messageArea.classList.remove("show");
    state.showResetButton = false;
    updateResultResetButton();
  }

  function showMessage(title, sub = "") {
    cardDisplay.classList.remove("show");
    messageArea.classList.add("show");
    messageTitle.textContent = title;
    messageSub.textContent = sub;
    updateResultResetButton();
  }

  function hideAnswer() {
    answerBadge.textContent = "";
    answerBadge.classList.remove("show");
  }

  function showAnswer(value) {
    answerBadge.textContent = String(value);
    answerBadge.classList.add("show");
  }

  function shakeCard() {
    shakeTarget.classList.remove("shake");
    void shakeTarget.offsetWidth;
    shakeTarget.classList.add("shake");
  }

  function flashCorrect() {
    cardInner.classList.remove("flashCorrect");
    void cardInner.offsetWidth;
    cardInner.classList.add("flashCorrect");
  }

  function clearEffects() {
    shakeTarget.classList.remove("shake");
    cardInner.classList.remove("flashCorrect");
  }

  function pickProblem() {
    let problem;

    do {
      const sum = Math.floor(Math.random() * 8) + 2; // 2〜9
      let leftCount = Math.floor(Math.random() * (sum - 1)) + 1;
      let rightCount = sum - leftCount;

      if (Math.random() < 0.5) {
        [leftCount, rightCount] = [rightCount, leftCount];
      }

      const pairKey = [leftCount, rightCount].sort((a, b) => a - b).join("-");

      problem = {
        count: sum,
        leftCount,
        rightCount,
        leftImage: CARD_IMAGES[leftCount],
        rightImage: CARD_IMAGES[rightCount],
        pairKey
      };
    } while (state.current && problem.pairKey === state.current.pairKey);

    return problem;
  }

  function setProblem(problem) {
    clearEffects();
    state.current = problem;

    appleCardImgLeft.src = problem.leftImage;
    appleCardImgLeft.alt = `ひだりの りんご ${problem.leftCount}`;

    appleCardImgRight.src = problem.rightImage;
    appleCardImgRight.alt = `みぎの りんご ${problem.rightCount}`;

    hideAnswer();
    showCard();
  }

  function updateControls() {
    if (state.mode === "practice") {
      controls.classList.add("hidden");
    } else {
      controls.classList.remove("hidden");
    }
  }

  function nextPracticeProblem() {
    state.practiceLocked = false;
    setPadDisabled(false);
    setProblem(pickProblem());
  }

  function resetPractice() {
    clearTimers();
    clearEffects();
    state.challengeRunning = false;
    state.challengeBusy = false;
    state.practiceLocked = false;
    state.showResetButton = false;

    updateControls();
    setPadDisabled(false);
    setProblem(pickProblem());
  }

  function resetChallengeReady() {
    clearTimers();
    clearEffects();
    state.challengeRunning = false;
    state.challengeBusy = false;
    state.score = 0;
    state.misses = 0;
    state.showResetButton = false;

    updateControls();
    setPadDisabled(true);

    mainBtn.disabled = false;
    mainBtn.textContent = "スタート";

    showMessage("30びょう", "スタートで はじめるよ");
  }

  function setMode(mode) {
    clearTimers();
    state.mode = mode;
    setModeButtons();
    updateControls();

    if (mode === "practice") {
      resetPractice();
    } else {
      resetChallengeReady();
    }
  }

  function endChallenge() {
    if (!state.challengeRunning) return;

    clearTimers();
    state.challengeRunning = false;
    state.challengeBusy = false;

    setPadDisabled(true);

    const isNewBest = state.score > state.best;
    if (isNewBest) {
      state.best = state.score;
      localStorage.setItem(STORAGE_BEST_KEY, String(state.best));
    }

    const subText = isNewBest
      ? `ミス ${state.misses}かい\nベスト こうしん！`
      : `ミス ${state.misses}かい\nベスト ${state.best}もん`;

    state.showResetButton = true;
    showMessage(`${state.score}もん\nできた！`, subText);

    mainBtn.disabled = false;
    mainBtn.textContent = "もういちど";
  }

  function startChallenge() {
    clearTimers();
    clearEffects();

    state.challengeRunning = true;
    state.challengeBusy = false;
    state.score = 0;
    state.misses = 0;
    state.endAt = Date.now() + 30000;
    state.showResetButton = false;

    mainBtn.disabled = true;
    mainBtn.textContent = "ちょうせん中";

    setPadDisabled(false);
    setProblem(pickProblem());

    state.timerId = setInterval(() => {
      if (Date.now() >= state.endAt) {
        endChallenge();
      }
    }, 100);
  }

  function scheduleNextPractice(ms) {
    clearTimeout(state.nextId);
    state.nextId = setTimeout(() => {
      if (state.mode !== "practice") return;
      nextPracticeProblem();
    }, ms);
  }

  function unlockSameChallengeProblem(ms) {
    clearTimeout(state.nextId);
    state.nextId = setTimeout(() => {
      if (!state.challengeRunning) return;
      if (Date.now() >= state.endAt) {
        endChallenge();
        return;
      }
      state.challengeBusy = false;
      setPadDisabled(false);
    }, ms);
  }

  function scheduleNextChallenge(ms) {
    clearTimeout(state.nextId);
    state.nextId = setTimeout(() => {
      if (!state.challengeRunning) return;

      if (Date.now() >= state.endAt) {
        endChallenge();
        return;
      }

      state.challengeBusy = false;
      setPadDisabled(false);
      setProblem(pickProblem());
    }, ms);
  }

  function handlePracticeAnswer(value) {
    if (!state.current || state.practiceLocked) return;

    if (value === state.current.count) {
      state.practiceLocked = true;
      setPadDisabled(true);
      showAnswer(value);
      flashCorrect();
      playCorrectSound();
      scheduleNextPractice(320);
    } else {
      shakeCard();
      playWrongSound();
    }
  }

  function handleChallengeAnswer(value) {
    if (!state.current || !state.challengeRunning || state.challengeBusy) return;

    state.challengeBusy = true;
    setPadDisabled(true);

    if (value === state.current.count) {
      state.score += 1;
      showAnswer(value);
      flashCorrect();
      playCorrectSound();
      scheduleNextChallenge(180);
    } else {
      state.misses += 1;
      shakeCard();
      playWrongSound();
      unlockSameChallengeProblem(200);
    }
  }

  function handleDigit(value) {
    if (state.mode === "practice") {
      handlePracticeAnswer(value);
    } else {
      handleChallengeAnswer(value);
    }
  }

  function resetBestRecord() {
    state.best = 0;
    localStorage.removeItem(STORAGE_BEST_KEY);
    state.showResetButton = false;
    showMessage(
      `${state.score}もん\nできた！`,
      `ミス ${state.misses}かい\nベストきろくを リセットしたよ`
    );
  }

  digitButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      handleDigit(Number(btn.dataset.digit));
    });
  });

  mainBtn.addEventListener("click", () => {
    if (state.mode === "challenge" && !state.challengeRunning) {
      startChallenge();
    }
  });

  resultResetBtn.addEventListener("click", () => {
    resetBestRecord();
  });

  practiceModeBtn.addEventListener("click", () => {
    if (state.mode !== "practice") {
      setMode("practice");
    }
  });

  challengeModeBtn.addEventListener("click", () => {
    if (state.mode !== "challenge") {
      setMode("challenge");
    }
  });

  soundBtn.addEventListener("click", () => {
    state.soundOn = !state.soundOn;
    localStorage.setItem(STORAGE_SOUND_KEY, state.soundOn ? "on" : "off");
    updateSoundButton();
  });

  document.addEventListener("keydown", (e) => {
    if (e.repeat) return;

    if (/^[1-9]$/.test(e.key)) {
      handleDigit(Number(e.key));
      return;
    }

    if (e.key === "Enter" && state.mode === "challenge" && !state.challengeRunning) {
      startChallenge();
    }
  });

  preloadImages();
  updateSoundButton();
  setMode("practice");
</script>
</body>
</html>
